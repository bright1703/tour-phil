[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Next.js SSG static export
[[plugins]]
  package = "@netlify/plugin-nextjs"

# 301 redirects for old URLs → new structure
[[redirects]]
  from = "/excursions/manila/"
  to = "/tours/manila-city-tour"
  status = 301

[[redirects]]
  from = "/excursions/tagaytay/"
  to = "/tours/tagaytay-taal"
  status = 301

[[redirects]]
  from = "/boracay/"
  to = "/islands/boracay"
  status = 301

[[redirects]]
  from = "/cebu/"
